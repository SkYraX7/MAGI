# Full local stack. `docker compose up` brings up Neo4j + Redis + backend + frontend.
# Neo4j and Redis are NOT published to the host (internal network only) per the
# security checklist; reach the app via the frontend (:3000) or backend (:8000).
services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-changeme} 'RETURN 1' || exit 1"]
      interval: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      # Override .env localhost defaults to the compose service names.
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379/0
    depends_on:
      neo4j: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  redis_data:
