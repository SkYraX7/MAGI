# Serves the built SPA and reverse-proxies API + WebSocket to the backend so the
# browser only ever talks to one origin (no CORS in prod). `backend` resolves on the
# docker-compose network.
upstream magi_backend {
  server backend:8000;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # REST API.
  location ~ ^/(auth|graph|healthz|metrics) {
    proxy_pass http://magi_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # WebSocket — needs the Upgrade/Connection headers.
  location /ws/ {
    proxy_pass http://magi_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }
}
